# Tiny Tapeout project information
project:
  title: "RF Energy Harvesting Smart Power SoC"
  author: "Priyaharini"
  discord: "discord id"   # optional but recommended
  description: "Smart RF energy harvesting SoC with FSM-based power management, duty cycle control, and adaptive load switching"
  language: "Verilog"
  clock_hz: 100000000   # 100 MHz

  tiles: "2x2"

  top_module: "tt_um_rf_energy_harvesting"

  source_files:
    - "project.v"
    - "top_rf_energy_soc.v"
    - "energy_level_detector.v"
    - "energy_predictor.v"
    - "power_fsm.v"
    - "task_scheduler.v"
    - "power_gating_unit.v"
    - "duty_cycle_controller.v"

pinout:
  # Inputs
  ui[0]: "rf_energy[0]"
  ui[1]: "rf_energy[1]"
  ui[2]: "rf_energy[2]"
  ui[3]: "rf_energy[3]"
  ui[4]: "rf_energy[4]"
  ui[5]: "rf_energy[5]"
  ui[6]: "rf_energy[6]"
  ui[7]: "rf_energy[7]"

  # Outputs
  uo[0]: "esp32_power"
  uo[1]: "oled_power"
  uo[2]: "sensor_power"
  uo[3]: "sensor_read"
  uo[4]: "data_tx"
  uo[5]: "oled_update"
  uo[6]: "sleep_mode"
  uo[7]: "duty_enable"

  # Bidirectional pins (not used)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
